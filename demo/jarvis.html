<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello JARVIS? · 직무 메모리</title>
<!--
  Hello JARVIS? — 직원 진입점 (정본)
  디자인: docs/DESIGN.md (Apple 각색 — awesome-design-md design-md/apple/DESIGN.md 기반)
    · SF Pro · Apple Action Blue(#0066cc/다크 #2997ff) 단일 액센트 · 여백 중심 · pill 버튼
    · 소프트 엘리베이션 1종 · 검색창에만 정적 글로우(회전 없음) · 헤드라인만 입체(그라데이션+드롭섀도)
  이전 시안: demo/jarvis-console.html (사이버 콘솔판 백업, 미채택)
-->
<style>
  /* ============ tokens (Apple 각색) ============ */
  :root{
    --canvas:#ffffff; --parchment:#f5f5f7; --pearl:#fafafc;
    --ink:#1d1d1f; --ink-2:#424245; --ink-muted:#6e6e73; --ink-faint:#86868b;
    --hairline:#d2d2d7; --divider:#eeeef0;
    --accent:#0066cc; --accent-2:#0071e3;           /* Apple Action Blue 단일 액센트 */
    --ok:#248a3d; --ok-bg:#e7f7ec; --warn:#9a6400; --warn-bg:#fbf1dd; --none:#86868b; --none-bg:#f0f0f2;
    --shadow:0 4px 24px rgba(0,0,0,.08);            /* 딱 하나의 시그니처 소프트 그림자 */
    /* 3D 헤드라인 (그라파이트 / 블루) */
    --h3-top:#4a4a4e; --h3-mid:#1d1d1f; --h3-bot:#5a5a5f; --h3-edge:rgba(29,29,31,.2);
    --j3-top:#66b1ff; --j3-mid:#0066cc; --j3-bot:#0053a6; --j3-edge:rgba(0,74,153,.4); --j3-glow:rgba(0,102,204,.3);
    --sans:"SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard Variable",Pretendard,"Malgun Gothic",system-ui,sans-serif;
    --r-lg:18px; --r-md:12px; --r-sm:8px;
  }
  html[data-theme="dark"]{
    --canvas:#000000; --parchment:#1c1c1e; --pearl:#161617;
    --ink:#f5f5f7; --ink-2:#d2d2d7; --ink-muted:#a1a1a6; --ink-faint:#86868b;
    --hairline:#3a3a3c; --divider:#2a2a2c;
    --accent:#2997ff; --accent-2:#0a84ff;
    --ok:#30d158; --ok-bg:#122a1a; --warn:#ff9f0a; --warn-bg:#2a2110; --none:#8a8a8e; --none-bg:#1c1c1e;
    --shadow:0 6px 34px rgba(0,0,0,.55);
    --h3-top:#ffffff; --h3-mid:#d8d8dc; --h3-bot:#98989d; --h3-edge:rgba(0,0,0,.6);
    --j3-top:#8ec4ff; --j3-mid:#2997ff; --j3-bot:#0a84ff; --j3-edge:rgba(0,40,90,.75); --j3-glow:rgba(41,151,255,.42);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--canvas);color:var(--ink);
    font-size:17px;line-height:1.47;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;transition:background .4s,color .4s}
  button,input{font:inherit;color:inherit}
  button{cursor:pointer;border:none;background:none}
  ::selection{background:color-mix(in srgb,var(--accent) 22%,transparent)}

  /* ============ top bar (slim, translucent, recedes) ============ */
  .bar{position:sticky;top:0;z-index:20;height:48px;display:flex;align-items:center;gap:14px;padding:0 22px;
    background:var(--canvas);border-bottom:1px solid var(--divider)}
  .brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;letter-spacing:-.02em}
  .brand .mark{width:24px;height:24px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .brand .mark i{width:9px;height:9px;border-radius:3px;border:2px solid #fff;display:block}
  .brand small{color:var(--ink-muted);font-weight:400;font-size:13px}
  .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .proto{font-size:12px;color:var(--ink-faint)}
  .toggle{width:32px;height:32px;border-radius:50%;background:var(--parchment);color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s}
  .toggle:hover{background:var(--divider)}
  .adminlink{font-size:12.5px;color:var(--ink-faint);text-decoration:none;padding:6px 10px;border-radius:9999px;transition:color .2s,background .2s}
  .adminlink:hover{color:var(--ink);background:var(--parchment)}

  /* ============ views ============ */
  .view{display:none}
  .view.active{display:block;animation:fade .5s cubic-bezier(.22,1,.36,1)}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.view.active{animation:none}*{transition-duration:.001s!important;animation-duration:.001s!important}}

  /* ============ ENTRY ============ */
  .entry-inner{max-width:740px;margin:0 auto;padding:120px 24px 80px;text-align:center}
  .mark-lg{width:66px;height:66px;margin:0 auto 34px;border-radius:17px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .mark-lg i{width:27px;height:27px;border-radius:8px;border:3px solid #fff;display:block}
  .display{font-size:clamp(40px,6vw,64px);font-weight:600;letter-spacing:-.035em;line-height:1.05;color:var(--ink)}
  /* 3D 헤드라인 — 그라데이션 글리프 + 얇은 압출 에지 + 소프트 앰비언트 (여기에만 입체) */
  .display .d3{background:linear-gradient(180deg,var(--h3-top),var(--h3-mid) 55%,var(--h3-bot));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 var(--h3-edge)) drop-shadow(0 2px 0 var(--h3-edge)) drop-shadow(0 12px 22px rgba(0,0,0,.16))}
  .display .d3.accent{background:linear-gradient(180deg,var(--j3-top),var(--j3-mid) 55%,var(--j3-bot));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 var(--j3-edge)) drop-shadow(0 2px 0 var(--j3-edge)) drop-shadow(0 14px 26px var(--j3-glow))}
  .lead{margin-top:18px;font-size:clamp(19px,2.4vw,23px);font-weight:400;line-height:1.42;color:var(--ink-muted);letter-spacing:-.014em}
  .lead b{color:var(--ink-2);font-weight:600}

  /* Spotlight-style search + static glow (검색창에만 · 회전 없음) */
  .search{position:relative;max-width:620px;margin:46px auto 0}
  .ai-glow{position:absolute;inset:-4px;border-radius:22px;z-index:0;opacity:.3;pointer-events:none;
    background:linear-gradient(120deg,#0a84ff,#5e5ce6 38%,#bf5af2 62%,#0a84ff);
    filter:blur(18px);transition:opacity .5s}
  .search:focus-within .ai-glow{opacity:.55}
  .field{position:relative;z-index:1;display:flex;align-items:center;gap:10px;background:var(--parchment);
    border:1px solid transparent;border-radius:var(--r-lg);padding:6px 6px 6px 20px;box-shadow:var(--shadow);transition:background .25s,border-color .25s}
  .search:focus-within .field{background:var(--canvas);border-color:var(--hairline)}
  .field .ico{color:var(--ink-faint);font-size:21px;flex-shrink:0;line-height:1}
  .field input{flex:1;min-width:0;background:none;border:none;outline:none;font-size:18px;letter-spacing:-.01em;padding:14px 0}
  .field input::placeholder{color:var(--ink-faint)}
  .field .go{flex-shrink:0;background:var(--accent);color:#fff;font-size:15px;font-weight:500;border-radius:12px;padding:12px 20px;transition:background .2s}
  .field .go:hover{background:var(--accent-2)}
  .field .back{color:var(--ink-muted);font-size:19px;padding:10px 12px;border-radius:11px;flex-shrink:0;transition:background .2s,color .2s}
  .field .back:hover{background:var(--divider);color:var(--ink)}

  /* examples — quiet Apple tiles */
  .examples{margin-top:54px;text-align:left}
  .ex-label{font-size:13px;font-weight:500;color:var(--ink-faint);letter-spacing:-.01em;margin:0 0 14px 4px}
  .ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tile{text-align:left;background:var(--pearl);border:1px solid var(--divider);border-radius:var(--r-md);
    padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:transform .2s,box-shadow .2s,border-color .2s,background .2s}
  .tile:hover{background:var(--canvas);border-color:var(--hairline);box-shadow:var(--shadow);transform:translateY(-2px)}
  .tile .q{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.35}
  .tile .h{font-size:13px;color:var(--ink-faint)}

  /* ============ RESULTS ============ */
  .results-inner{max-width:820px;margin:0 auto;padding:36px 24px 96px}
  .search.sm{margin:0 0 40px;max-width:none}
  .search.sm .field{padding:5px 5px 5px 8px;box-shadow:none;border-color:var(--divider);background:var(--parchment)}

  .block{margin-bottom:42px}
  .label{font-size:13px;font-weight:600;color:var(--ink-faint);letter-spacing:.01em;display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .label .sep{width:3px;height:3px;border-radius:50%;background:var(--ink-faint);opacity:.6}
  .verified{color:var(--ok)}

  .answer-q{font-size:clamp(25px,3.2vw,32px);font-weight:600;letter-spacing:-.025em;line-height:1.24;margin-bottom:20px;color:var(--ink)}
  .answer-body{font-size:18px;line-height:1.62;color:var(--ink-2);letter-spacing:-.011em}
  .answer-body p+p{margin-top:15px}
  .em{background:none;font-weight:600;color:var(--ink)}       /* Apple: 강조는 형광·밑줄이 아니라 굵기 */
  .cite{display:inline-flex;align-items:center;gap:5px;background:var(--pearl);border:1px solid var(--divider);
    border-radius:9999px;font-size:13px;font-weight:500;color:var(--ink-muted);padding:2px 10px;white-space:nowrap;vertical-align:2px;margin:0 2px}
  .cite b{color:var(--ink-2);font-weight:600}

  /* sources — Apple grouped list card */
  .src-list{list-style:none;background:var(--pearl);border:1px solid var(--divider);border-radius:var(--r-lg);overflow:hidden}
  .src{display:flex;align-items:center;gap:16px;padding:16px 20px}
  .src+.src{border-top:1px solid var(--divider)}
  .src .num{width:28px;height:28px;flex-shrink:0;border-radius:8px;background:var(--canvas);border:1px solid var(--hairline);
    color:var(--ink-muted);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .src-main{flex:1;min-width:0}
  .src-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.012em;line-height:1.35}
  .src-note{font-size:13.5px;color:var(--ink-faint);margin-top:2px}
  .src-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .conf{font-size:14px;font-weight:600;color:var(--ink-2);font-variant-numeric:tabular-nums}
  .badge{font-size:12px;font-weight:600;padding:3px 11px;border-radius:9999px;white-space:nowrap}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}
  .badge.warn{background:var(--warn-bg);color:var(--warn)}
  .badge.none{background:var(--none-bg);color:var(--none)}

  /* actions — Apple pill buttons */
  .actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:16px;font-weight:500;letter-spacing:-.01em;
    border-radius:9999px;padding:12px 24px;text-decoration:none;transition:background .2s,transform .1s;border:1px solid transparent}
  .btn:active{transform:scale(.98)}
  .btn .arr{transition:transform .2s}
  .btn:hover .arr{transform:translateX(3px)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-2)}
  .btn-ghost{background:transparent;color:var(--accent)}
  .btn-ghost:hover{background:var(--pearl)}

  .disclaimer{font-size:13px;line-height:1.55;color:var(--ink-faint);max-width:660px}
  .disclaimer b{color:var(--ink-muted);font-weight:600}

  /* loading */
  .thinking{display:flex;align-items:center;gap:11px;font-size:16px;font-weight:500;color:var(--ink-muted);padding:10px 0}
  .thinking .spin{width:16px;height:16px;border:2px solid var(--divider);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .skel{height:16px;border-radius:8px;background:linear-gradient(90deg,var(--pearl),var(--divider),var(--pearl));background-size:200% 100%;animation:sh 1.3s infinite;margin:12px 0}
  @keyframes sh{to{background-position:-200% 0}}
  .skel.w80{width:80%}.skel.w60{width:60%}

  @media (max-width:600px){
    .bar{padding:0 16px}
    .brand small,.proto{display:none}
    .entry-inner{padding:76px 18px 56px}
    .ex-grid{grid-template-columns:1fr}
    .src{flex-wrap:wrap}
    .src-meta{width:100%;padding-left:44px}
  }
</style>
</head>
<body>

<header class="bar">
  <div class="brand"><span class="mark"><i></i></span>직무 메모리 <small>· 업무 승계 비서</small></div>
  <div class="right">
    <span class="proto">시연용 목업 · 샘플 데이터</span>
    <a class="adminlink" href="admin.html">관리자</a>
    <button class="toggle" id="themeBtn" onclick="toggleTheme()" aria-label="라이트/다크" title="라이트/다크">◐</button>
  </div>
</header>

<!-- ================= ENTRY ================= -->
<main class="view entry active" id="entry">
  <div class="entry-inner">
    <div class="mark-lg"><i></i></div>
    <h1 class="display"><span class="d3">Hello,</span> <span class="d3 accent">JARVIS?</span></h1>
    <p class="lead">사내 결재문서 · 규정 · 회의록 · 반려 이력을 근거로 답하는<br><b>우리 회사 전용 업무 비서</b>입니다.</p>

    <div class="search">
      <div class="ai-glow" aria-hidden="true"></div>
      <form class="field" onsubmit="return ask()">
        <span class="ico" aria-hidden="true">⌕</span>
        <input id="q" type="text" autocomplete="off" placeholder="예: 정산시스템 전환은 뭘 먼저 확인해야 해?">
        <button class="go" type="submit">묻기</button>
      </form>
    </div>

    <div class="examples">
      <div class="ex-label">예시 질문</div>
      <div class="ex-grid" id="exGrid"></div>
    </div>
  </div>
</main>

<!-- ================= RESULTS ================= -->
<main class="view results" id="results">
  <div class="results-inner">
    <div class="search sm">
      <form class="field" onsubmit="return ask()">
        <button class="back" type="button" onclick="home()" aria-label="처음으로">←</button>
        <span class="ico" aria-hidden="true">⌕</span>
        <input id="q2" type="text" autocomplete="off">
        <button class="go" type="submit">묻기</button>
      </form>
    </div>
    <div id="stream"></div>
  </div>
</main>

<script>
  /* ---------- 예시 질문 + 답변 (팀원 엔진 QA/초안/점검 흐름을 목업화 · jarvis.html과 동일) ---------- */
  const ANSWERS = {
    prep: {
      q: "정산시스템 전환은 뭘 먼저 확인해야 해?",
      hint: "업무 맥락 · 의존관계",
      meta: "근거 4건", verified: true,
      body: `<p>정산시스템 전환을 시작하기 전에는 <mark class="em">IT운영팀 배포 일정</mark>을 먼저 확인해야 합니다
        <span class="cite">작성자확인 · <b>87%</b></span>. 이 일정이 지연되면 전환 보고와 병행 운영 점검도 함께 밀릴 수 있습니다.</p>
        <p>작년 전환 보고 문서에는 병행 운영 중 <mark class="em">정산 오차 검증 절차</mark>를 신설한 이력이 있고,
        올해 계획 수립 시 전환 일정 반영이 필요하다고 표시되어 있습니다.</p>`,
      sources: [
        {t:"2025년 정산시스템 전환 2단계 추진 보고", n:"APPR-2025-0109 · 전환 일정 근거", s:"ok", c:87},
        {t:"2024년 정산시스템 전환 1단계 추진 보고", n:"APPR-2024-0111 · 반복 업무 근거", s:"ok", c:84},
        {t:"차세대 정산시스템 오차 검증 회의록", n:"MTG-2025-0708 · 정보화부서 협조", s:"ok", c:78},
        {t:"정산시스템 병행 운영 구두 협의", n:"근거 문서 없음 · 전임자 확인 필요", s:"none", c:null},
      ],
      actions: [
        {kind:"primary", label:"전환 보고 초안 열기", href:"index.html#s3"},
        {kind:"ghost", label:"관련 브리핑북 보기", href:"index.html#s1"},
        {kind:"ghost", label:"기안 전 사전점검", href:"index.html#s4"},
      ],
    },
    mid: {
      q: "요금정산 중간보고, 작년엔 어떻게 기안했지?",
      hint: "반복 업무 · 근거 3건",
      meta: "근거 3건", verified: true,
      body: `<p>작년 기준 요금정산 중간보고는 <mark class="em">7월 10일에 기안</mark>되었고, <mark class="em">3년 연속</mark> 반복된 업무입니다
        <span class="cite">2025 중간보고 · <b>96%</b></span>. 보고 기준월은 <mark class="em">6월 말 실적</mark>이며, 올해는
        <mark class="em">차세대 정산시스템 전환 일정</mark>을 신규 변수로 반영해야 합니다
        <span class="cite">차세대 전환계획 · <b>88%</b></span>.</p>
        <p>초안은 작년 원문을 골격으로 자동 구성할 수 있습니다. 아래 <b>초안 스튜디오</b>에서 바로 열어 올해 수치만 갱신하세요.</p>`,
      sources: [
        {t:"2025년 7월 요금정산 중간보고 기안", n:"작년 원문 · 기안일 2025-07-10", s:"ok", c:96},
        {t:"정산시스템 차세대 전환 계획", n:"2025-09 · 진행 중 이슈", s:"ok", c:88},
        {t:"요금정산 연간계획 수립(2025-03)", n:"기준월 표기가 상이 — 확인 권장", s:"warn", c:71},
        {t:"정산 단가 산정 기준 협의", n:"구두 협의만 확인 · 문서 없음", s:"none", c:null},
      ],
      actions: [
        {kind:"primary", label:"작년 양식으로 초안 만들기", href:"index.html#s3"},
        {kind:"ghost", label:"업무 일기예보 보기", href:"index.html#s2"},
        {kind:"ghost", label:"사전점검으로 넘기기", href:"index.html#s4"},
      ],
    },
    july: {
      q: "이 자리에서 7월에 반복되는 업무는?",
      hint: "업무 일기예보 · 근거 3건",
      meta: "근거 3건", verified: true,
      body: `<p>요금정산팀 7월에는 <mark class="em">3건</mark>이 반복됩니다: <mark class="em">중간보고 기안(D-4)</mark>,
        하절기 설비 안전점검 결과 보고(D-9), 이사회 보고 안건 자료 제출(D-14)
        <span class="cite">최근 2~3년 기안주기</span>. 모두 최근 몇 년 같은 시기에 기안되어, 다가오는 순서대로 예보로 잡았습니다.</p>`,
      sources: [
        {t:"요금정산 중간보고 (내 자리)", n:"작년 7/10 · 3년 연속 · D-4", s:"ok", c:94},
        {t:"하절기 설비 안전점검 결과 보고", n:"작년 7/16 · 담당 박수연 대리 · D-9", s:"ok", c:82},
        {t:"이사회 보고 안건 자료 제출", n:"작년 7/21 · 팀 공통 · D-14", s:"ok", c:79},
      ],
      actions: [
        {kind:"primary", label:"D-4 업무 초안 준비", href:"index.html#s3"},
        {kind:"ghost", label:"달력 대시보드 열기", href:"index.html#s2"},
        {kind:"ghost", label:"근거 문서 보기", href:"index.html#s1"},
      ],
    },
    risk: {
      q: "산출근거 표 누락으로 반려된 적 있어?",
      hint: "사전 점검 · 반려/감사 이력",
      meta: "근거 5건", verified: true,
      body: `<p>있습니다. 계획·보고 유형 기안에서 <mark class="em">산출근거 표 누락</mark>은 과거 반려·감사 지적과 연결된 리스크입니다
        <span class="cite">작성자확인 · <b>97%</b></span>. 같은 표현이나 표 누락 패턴이 보이면 사전점검에서 확인 필요로 표시됩니다.</p>
        <p>JARVIS는 "문제 없음"을 단정하지 않고, 어떤 문서와 이력이 리스크 판단의 근거인지 먼저 보여줍니다.</p>`,
      sources: [
        {t:"2025년 연간 정산계획 반려 사유", n:"산출근거 표 누락 · 반려 이력", s:"ok", c:97},
        {t:"2024년 감사 지적 사례", n:"근거 자료 미첨부 유형", s:"ok", c:94},
        {t:"계획·보고 작성 체크리스트", n:"표·수치 출처 확인 항목", s:"ok", c:89},
        {t:"구두 협의 기반 일정", n:"문서 근거 없음 · 보완 필요", s:"none", c:null},
      ],
      actions: [
        {kind:"primary", label:"이 문구로 사전점검 실행", href:"index.html#s4"},
        {kind:"ghost", label:"보완 초안 열기", href:"index.html#s3"},
        {kind:"ghost", label:"관련 브리핑북 보기", href:"index.html#s1"},
      ],
    },
    jeongsan: {
      q: "정산 기준일, 어떻게 써야 반려 안 나?",
      hint: "사전 점검 · 반려 이력 대조",
      meta: "근거 2건", verified: true,
      body: `<p>정산 기준일을 <mark class="em">특정 날짜(예: 6월 30일)로 고정</mark>하면 준공일 변동 시 재기안 사유가 됩니다.
        2024년 5월 동일 유형 기안이 <mark class="em">반려된 이력</mark>이 있습니다
        <span class="cite">반려 이력 2024.05 · <b>90%</b></span>. <mark class="em">"준공검사 완료일 기준"</mark>으로
        표기하는 것이 공사정산업무지침과 일치합니다
        <span class="cite">공사정산업무지침 §8 · <b>95%</b></span>.</p>`,
      sources: [
        {t:"공사정산업무지침 제8조(정산 기준)", n:"지침 원문", s:"ok", c:95},
        {t:"2024.05 유사 기안 반려 이력", n:"반려 사유 동일", s:"ok", c:90},
      ],
      actions: [
        {kind:"primary", label:"정산 기준일 사전점검", href:"index.html#s4"},
        {kind:"ghost", label:"초안 스튜디오에서 수정", href:"index.html#s3"},
        {kind:"ghost", label:"업무 지침 보기", href:"index.html#s1"},
      ],
    },
  };
  const EXAMPLES = ["prep","mid","risk","july"];
  const BADGE = {ok:"검증됨", warn:"주의", none:"근거 없음"};

  const exGrid = document.getElementById("exGrid");
  exGrid.innerHTML = EXAMPLES.map(k=>{
    const a = ANSWERS[k];
    return `<button class="tile" onclick="ask('${k}')"><span class="q">${a.q}</span><span class="h">${a.hint}</span></button>`;
  }).join("");

  const vEntry = document.getElementById("entry");
  const vResults = document.getElementById("results");
  const q = document.getElementById("q");
  const q2 = document.getElementById("q2");
  const stream = document.getElementById("stream");
  const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;

  function show(view){
    vEntry.classList.toggle("active", view==="entry");
    vResults.classList.toggle("active", view==="results");
  }
  function home(){ show("entry"); q.value=""; setTimeout(()=>q.focus(),50); }

  function findKey(text){
    if(ANSWERS[text]) return text;
    const t = (text||"").trim();
    if(!t) return "mid";
    if(/전환|정산시스템|IT|정보화|먼저|협의|확인/.test(t)) return "prep";
    if(/7월|반복|예보|이번 ?달/.test(t)) return "july";
    if(/산출근거|누락|리스크|감사|지적|조심/.test(t)) return "risk";
    if(/기준일|반려|정산 ?기준/.test(t)) return "jeongsan";
    return "mid";
  }

  function ask(preset){
    let key, typed;
    if(typeof preset === "string"){ key = preset; typed = ANSWERS[key] ? ANSWERS[key].q : preset; }
    else { typed = (vResults.classList.contains("active") ? q2.value : q.value); key = findKey(typed); if(!typed) typed = ANSWERS[key].q; }
    q.value = typed; q2.value = typed;
    show("results");
    window.scrollTo(0,0);
    render(key, typed);
    return false;
  }

  function render(key, typed){
    const a = ANSWERS[key] || ANSWERS.mid;
    stream.innerHTML = `
      <div class="thinking"><span class="spin"></span>사내 결재문서·규정·회의록에서 근거를 찾는 중…</div>
      <div class="skel"></div><div class="skel w80"></div><div class="skel w60"></div>`;
    const reveal = ()=>{
      const srcRows = a.sources.map((s,i)=>`
        <li class="src">
          <span class="num">${i+1}</span>
          <div class="src-main"><div class="src-title">${s.t}</div><div class="src-note">${s.n}</div></div>
          <div class="src-meta">
            ${s.c!=null?`<span class="conf">${s.c}%</span>`:""}
            <span class="badge ${s.s}">${BADGE[s.s]}</span>
          </div>
        </li>`).join("");
      const actionRows = (a.actions || []).map(x =>
        `<a class="btn ${x.kind==="primary"?"btn-primary":"btn-ghost"}" href="${x.href}">${x.label}${x.kind==="primary"?` <span class="arr">→</span>`:""}</a>`
      ).join("");
      stream.innerHTML = `
        <div class="block">
          <div class="label">답변 <span class="sep"></span> ${a.meta} <span class="sep"></span>
            <span class="${a.verified?'verified':''}">${a.verified?'검증됨':'검증 필요'}</span></div>
          <div class="answer-q">${typed}</div>
          <div class="answer-body">${a.body}</div>
        </div>
        <div class="block">
          <div class="label">근거 문서</div>
          <ol class="src-list">${srcRows}</ol>
        </div>
        <div class="actions">${actionRows}</div>
        <p class="disclaimer">JARVIS는 <b>"문제 없음"을 판정하지 않습니다</b> — 근거와 검증 상태를 보여줄 뿐, 최종 판단은 담당자에게 있습니다.
          근거가 없는 항목은 <b>근거 없음</b>으로 그대로 노출합니다.</p>`;
    };
    reduce ? reveal() : setTimeout(reveal, 640);
  }

  function applyTheme(t){ document.documentElement.setAttribute("data-theme", t);
    document.getElementById("themeBtn").textContent = t==="dark" ? "☀" : "◐"; }
  function toggleTheme(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark"); }
  applyTheme(matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light");

  addEventListener("keydown", e=>{ if(e.key==="Escape" && vResults.classList.contains("active")) home(); });
  q.focus();
</script>
</body>
</html>
