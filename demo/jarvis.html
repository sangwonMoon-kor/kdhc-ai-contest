<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello JARVIS? · 직무 메모리</title>
<style>
  :root{
    --canvas:#070808;
    --surface:#101214;
    --surface-2:#171a1d;
    --surface-3:#1d2227;
    --ink:#f4f7f8;
    --ink-soft:#c7d0d5;
    --muted:#7f8b92;
    --line:#263038;
    --line-strong:#3b4a54;
    --cyan:#00e5ff;
    --cyan-soft:#102a31;
    --cyan-line:#155563;
    --green:#00d992;
    --green-soft:#10291f;
    --amber:#ff7a17;
    --amber-soft:#2b1c0f;
    --danger:#ff5a66;
    --danger-soft:#30161b;
    --radius:8px;
    --sans:Inter,"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --mono:"SFMono-Regular","Cascadia Mono","JetBrains Mono",Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    min-height:100vh;
    background:var(--canvas);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.55;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:72px 72px;
    mask-image:linear-gradient(180deg, rgba(0,0,0,.9), rgba(0,0,0,.25) 58%, rgba(0,0,0,.9));
  }
  body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.035),transparent 20%,transparent 80%,rgba(0,0,0,.5));
  }
  a{color:inherit;text-decoration:none}
  button,input{font:inherit}
  button{border:0;background:none;color:inherit;cursor:pointer}
  .app{position:relative;z-index:1;min-height:100vh;display:grid;grid-template-rows:64px 1fr}
  .topbar{
    display:flex;align-items:center;gap:18px;
    height:64px;padding:0 28px;
    border-bottom:1px solid var(--line);
    background:rgba(7,8,8,.82);
    backdrop-filter:blur(18px);
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:600;color:var(--ink)}
  .mark{
    width:30px;height:30px;border:1px solid var(--cyan-line);border-radius:50%;
    display:grid;place-items:center;color:var(--cyan);
    box-shadow:0 0 28px rgba(0,229,255,.18) inset;
  }
  .mark::before{content:"";width:10px;height:10px;border:2px solid currentColor;border-radius:50%}
  .brand small{display:block;color:var(--muted);font-size:12px;font-weight:400}
  .topbar nav{margin-left:auto;display:flex;align-items:center;gap:8px}
  .navlink{
    min-height:36px;display:inline-flex;align-items:center;
    padding:0 14px;border:1px solid transparent;border-radius:999px;
    color:var(--ink-soft);font-size:13px;
  }
  .navlink:hover{border-color:var(--line-strong);background:var(--surface)}
  .navlink.admin{color:var(--green);border-color:rgba(0,217,146,.28)}
  .status-dot{
    display:inline-flex;align-items:center;gap:7px;
    color:var(--muted);font-family:var(--mono);font-size:12px;
  }
  .status-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 12px rgba(0,217,146,.8)}

  .view{display:none}
  .view.active{display:block;animation:fadeIn .28s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.view.active{animation:none}*,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}}

  .entry{
    min-height:calc(100vh - 64px);
    display:grid;place-items:center;
    padding:40px 22px 56px;
  }
  .entry-panel{width:min(820px,100%);text-align:center}
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    color:var(--cyan);font-family:var(--mono);font-size:12px;
    margin-bottom:24px;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:48px;height:1px;background:var(--cyan-line)}
  h1{
    font-size:64px;
    font-weight:400;
    line-height:1.02;
    letter-spacing:0;
  }
  h1 .name{color:var(--cyan);text-shadow:0 0 26px rgba(0,229,255,.32)}
  .lead{
    max-width:650px;margin:22px auto 0;
    color:var(--ink-soft);font-size:18px;line-height:1.65;
  }
  .lead strong{color:var(--ink);font-weight:600}
  .search-shell{
    margin:42px auto 0;
    width:min(760px,100%);
    border:1px solid var(--line-strong);
    border-radius:999px;
    background:rgba(16,18,20,.92);
    box-shadow:0 0 0 1px rgba(0,229,255,.04), 0 0 44px rgba(0,229,255,.08);
    display:flex;align-items:center;gap:10px;
    padding:8px;
  }
  .search-icon{
    width:44px;height:44px;border-radius:50%;
    display:grid;place-items:center;
    color:var(--cyan);
    border:1px solid var(--line);
    font-family:var(--mono);
  }
  .search-shell input{
    min-width:0;flex:1;height:44px;background:transparent;border:0;outline:0;
    color:var(--ink);font-size:16px;
  }
  .search-shell input::placeholder{color:var(--muted)}
  .go{
    height:44px;border-radius:999px;padding:0 20px;
    background:var(--cyan);color:#061012;font-weight:700;
    transition:background .18s, transform .18s;
  }
  .go:hover{background:#8cf4ff;transform:translateY(-1px)}
  .system-strip{
    margin:18px auto 0;width:min(680px,100%);
    display:flex;justify-content:center;flex-wrap:wrap;gap:8px;
  }
  .pill{
    display:inline-flex;align-items:center;gap:7px;
    min-height:30px;padding:0 12px;border-radius:999px;
    border:1px solid var(--line);background:rgba(16,18,20,.72);
    color:var(--muted);font-family:var(--mono);font-size:12px;
  }
  .pill.ok{color:var(--green);border-color:rgba(0,217,146,.26)}
  .examples{margin:34px auto 0;width:min(760px,100%);text-align:left}
  .examples-title{color:var(--muted);font-family:var(--mono);font-size:12px;margin:0 0 12px 8px}
  .example-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{
    text-align:left;border:1px solid var(--line);border-radius:var(--radius);
    background:rgba(16,18,20,.78);padding:16px 18px;
    min-height:86px;transition:border-color .18s, background .18s, transform .18s;
  }
  .tile:hover{border-color:var(--cyan-line);background:rgba(18,31,35,.88);transform:translateY(-1px)}
  .tile b{display:block;font-size:14px;color:var(--ink);font-weight:500}
  .tile span{display:block;margin-top:6px;color:var(--muted);font-size:12px}

  .results{padding:28px 22px 72px}
  .results-inner{width:min(1040px,100%);margin:0 auto}
  .results-search{margin-bottom:28px}
  .back{
    height:44px;width:44px;border-radius:50%;
    display:grid;place-items:center;border:1px solid var(--line);
    color:var(--ink-soft);
  }
  .back:hover{border-color:var(--cyan-line);color:var(--cyan)}
  .answer-grid{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px;align-items:start}
  .panel{
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:rgba(16,18,20,.9);
  }
  .panel.pad{padding:24px}
  .section-label{
    display:flex;align-items:center;gap:10px;
    color:var(--muted);font-family:var(--mono);font-size:12px;margin-bottom:14px;
  }
  .section-label::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--cyan)}
  .question{font-size:28px;line-height:1.32;font-weight:500;margin-bottom:18px}
  .answer-body{color:var(--ink-soft);font-size:16px;line-height:1.78}
  .answer-body p+p{margin-top:14px}
  .em{color:var(--ink);font-weight:600;background:transparent;border-bottom:1px solid var(--cyan)}
  .cite{
    display:inline-flex;align-items:center;gap:6px;vertical-align:1px;
    margin:0 2px;padding:2px 8px;border-radius:999px;
    background:var(--green-soft);border:1px solid rgba(0,217,146,.28);
    color:var(--green);font-family:var(--mono);font-size:12px;
  }
  .source-list{list-style:none;margin-top:14px;border-top:1px solid var(--line)}
  .source{
    display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:14px;
    padding:15px 0;border-bottom:1px solid var(--line);
  }
  .source .num{
    width:28px;height:28px;border-radius:50%;display:grid;place-items:center;
    border:1px solid var(--line-strong);color:var(--cyan);font-family:var(--mono);font-size:12px;
  }
  .source b{display:block;color:var(--ink);font-size:14px;font-weight:500}
  .source span{display:block;margin-top:4px;color:var(--muted);font-size:12px}
  .source-meta{display:flex;align-items:flex-start;gap:8px}
  .conf{font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding-top:3px}
  .badge{
    display:inline-flex;align-items:center;min-height:26px;padding:0 9px;
    border-radius:999px;font-size:12px;font-weight:600;
  }
  .badge.ok{background:var(--green-soft);color:var(--green);border:1px solid rgba(0,217,146,.3)}
  .badge.warn{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(255,122,23,.32)}
  .badge.none{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
  .side{position:sticky;top:82px;display:grid;gap:12px}
  .action-card{
    display:flex;gap:12px;align-items:center;
    min-height:72px;padding:14px;border:1px solid var(--line);
    border-radius:var(--radius);background:rgba(16,18,20,.9);
    transition:border-color .18s, transform .18s, background .18s;
  }
  .action-card:hover{border-color:var(--cyan-line);background:rgba(18,31,35,.92);transform:translateY(-1px)}
  .action-ico{
    width:40px;height:40px;border-radius:8px;
    display:grid;place-items:center;background:var(--cyan-soft);color:var(--cyan);
    font-family:var(--mono);font-weight:700;
  }
  .action-card b{display:block;font-size:14px;font-weight:600}
  .action-card span{display:block;margin-top:3px;color:var(--muted);font-size:12px}
  .trust{
    padding:15px;border:1px dashed var(--line-strong);border-radius:var(--radius);
    color:var(--muted);font-size:12px;line-height:1.65;
  }
  .trust b{color:var(--ink-soft);font-weight:600}
  .thinking{display:flex;align-items:center;gap:11px;color:var(--cyan);font-family:var(--mono);font-size:13px}
  .spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--cyan-line);border-top-color:var(--cyan);animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .skel{height:14px;border-radius:999px;background:var(--surface-2);margin:12px 0}
  .skel.w70{width:70%}.skel.w46{width:46%}

  @media (max-width:800px){
    .topbar{padding:0 16px}
    .topbar nav .navlink:not(.admin),.status-dot{display:none}
    h1{font-size:44px}
    .lead{font-size:16px}
    .search-shell{border-radius:18px;align-items:stretch}
    .search-icon{display:none}
    .go{padding:0 16px}
    .example-grid{grid-template-columns:1fr}
    .answer-grid{grid-template-columns:1fr}
    .side{position:static}
    .source{grid-template-columns:30px minmax(0,1fr)}
    .source-meta{grid-column:2;align-items:center}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="mark" aria-hidden="true"></span>
      <span>직무 메모리<small>Hello JARVIS console</small></span>
    </a>
    <nav>
      <span class="status-dot">LOCAL / GROUNDED</span>
      <a class="navlink" href="index.html">발표 본편</a>
      <a class="navlink admin" href="admin.html">관리자 콘솔</a>
    </nav>
  </header>

  <main class="view entry active" id="entry">
    <section class="entry-panel">
      <div class="eyebrow">INTERNAL MEMORY ONLINE</div>
      <h1>Hello, <span class="name">JARVIS?</span></h1>
      <p class="lead">사내 결재문서, 규정, 회의록, 반려 이력을 근거로 답합니다. 직원은 <strong>묻고, 확인하고, 바로 업무를 시작</strong>하면 됩니다.</p>
      <form class="search-shell" onsubmit="return ask()">
        <span class="search-icon">⌕</span>
        <input id="q" type="text" autocomplete="off" placeholder="예: 정산시스템 전환은 뭘 먼저 확인해야 해?">
        <button class="go" type="submit">묻기</button>
      </form>
      <div class="system-strip" aria-label="system state">
        <span class="pill ok">외부 AI 0</span>
        <span class="pill">사내 문서 근거</span>
        <span class="pill">모르면 모른다고 답함</span>
      </div>
      <div class="examples">
        <div class="examples-title">SUGGESTED QUERIES</div>
        <div class="example-grid" id="exGrid"></div>
      </div>
    </section>
  </main>

  <main class="view results" id="results">
    <div class="results-inner">
      <form class="search-shell results-search" onsubmit="return ask()">
        <button class="back" type="button" onclick="home()" aria-label="처음으로">←</button>
        <input id="q2" type="text" autocomplete="off">
        <button class="go" type="submit">다시 묻기</button>
      </form>
      <div id="stream"></div>
    </div>
  </main>
</div>

<script>
  const ANSWERS = {
    prep: {
      q: "정산시스템 전환은 뭘 먼저 확인해야 해?",
      hint: "업무 맥락 · 협조처 · 일정 의존성",
      meta: "근거 4건",
      verified: true,
      body: `<p>정산시스템 전환을 시작하기 전에는 <mark class="em">IT운영팀 배포 일정</mark>을 먼저 확인해야 합니다 <span class="cite">작성자확인 87%</span>. 이 일정이 밀리면 전환 보고와 병행 운영 점검도 함께 지연될 수 있습니다.</p><p>작년 전환 보고에는 병행 운영 중 <mark class="em">정산 오차 검증 절차</mark>를 신설한 이력이 있고, 올해 계획 수립 시 전환 일정 반영이 필요하다고 표시되어 있습니다.</p>`,
      sources: [
        {t:"2025년 정산시스템 전환 2단계 추진 보고", n:"APPR-2025-0109 · 전환 일정 근거", s:"ok", c:87},
        {t:"2024년 정산시스템 전환 1단계 추진 보고", n:"APPR-2024-0111 · 반복 업무 근거", s:"ok", c:84},
        {t:"차세대 정산시스템 오차 검증 회의록", n:"MTG-2025-0708 · 정보화부서 협조", s:"ok", c:78},
        {t:"정산시스템 병행 운영 구두 협의", n:"근거 문서 없음 · 전임자 확인 필요", s:"none", c:null}
      ],
      actions: [
        {label:"전환 보고 초안 열기", sub:"작년 구조로 S3 초안 생성", href:"index.html#s3", icon:"D"},
        {label:"관련 브리핑북 보기", sub:"이 업무의 맥락 확인", href:"index.html#s1", icon:"B"},
        {label:"기안 전 사전점검", sub:"반려·감사 리스크 확인", href:"index.html#s4", icon:"C"}
      ]
    },
    mid: {
      q: "요금정산 중간보고, 작년엔 어떻게 기안했지?",
      hint: "반복 업무 · 작년 양식 · 초안",
      meta: "근거 3건",
      verified: true,
      body: `<p>작년 기준 요금정산 중간보고는 <mark class="em">7월 10일에 기안</mark>했고, 3년 연속 반복된 업무입니다 <span class="cite">2025 중간보고 96%</span>. 보고 기준월은 6월 말 실적이며, 올해는 <mark class="em">차세대 정산시스템 전환 일정</mark>을 신규 변수로 반영해야 합니다.</p><p>아래 초안 스튜디오에서 작년 문서 구조를 그대로 열고, 연도·수치·일정만 확인하면 됩니다.</p>`,
      sources: [
        {t:"2025년 7월 요금정산 중간보고 기안", n:"작년 원문 · 기안일 2025-07-10", s:"ok", c:96},
        {t:"정산시스템 차세대 전환 계획", n:"2025-09 · 진행 중 이슈", s:"ok", c:88},
        {t:"요금정산 연간계획 수립", n:"기준월 표기가 상이 · 확인 권장", s:"warn", c:71}
      ],
      actions: [
        {label:"작년 양식으로 초안 만들기", sub:"S3 초안 스튜디오", href:"index.html#s3", icon:"D"},
        {label:"업무 일기예보 보기", sub:"다가오는 반복 업무", href:"index.html#s2", icon:"F"},
        {label:"사전점검으로 넘기기", sub:"기안 전 리스크 확인", href:"index.html#s4", icon:"C"}
      ]
    },
    risk: {
      q: "산출근거 표 누락으로 반려된 적 있어?",
      hint: "사전점검 · 반려/감사 이력",
      meta: "근거 5건",
      verified: true,
      body: `<p>있습니다. 계획·보고 유형 기안에서 <mark class="em">산출근거 표 누락</mark>은 과거 반려·감사 지적과 연결된 리스크입니다 <span class="cite">작성자확인 97%</span>. 같은 표현이나 표 누락 패턴이 보이면 사전점검에서 확인 필요로 표시됩니다.</p><p>JARVIS는 문제 없음을 단정하지 않고, 어떤 문서와 이력이 판단 근거인지 먼저 보여줍니다.</p>`,
      sources: [
        {t:"2025년 연간 정산계획 반려 사유", n:"산출근거 표 누락 · 반려 이력", s:"ok", c:97},
        {t:"2024년 감사 지적 사례", n:"근거 자료 미첨부 유형", s:"ok", c:94},
        {t:"계획·보고 작성 체크리스트", n:"표·수치 출처 확인 항목", s:"ok", c:89},
        {t:"구두 협의 기반 일정", n:"문서 근거 없음 · 보완 필요", s:"none", c:null}
      ],
      actions: [
        {label:"이 문구로 사전점검 실행", sub:"S4 리스크 하이라이트", href:"index.html#s4", icon:"C"},
        {label:"보완 초안 열기", sub:"누락 항목 채우기", href:"index.html#s3", icon:"D"},
        {label:"관련 브리핑북 보기", sub:"근거 문서 맥락", href:"index.html#s1", icon:"B"}
      ]
    },
    july: {
      q: "이 자리에서 7월에 반복되는 업무는?",
      hint: "업무 예보 · D-day · 반복 탐지",
      meta: "근거 3건",
      verified: true,
      body: `<p>요금정산 담당 자리의 7월 반복 업무는 <mark class="em">중간보고 기안, 하절기 설비 안전점검 결과 보고, 이사회 보고 안건 제출</mark>입니다. 가장 가까운 업무는 중간보고 기안이며 현재 D-4로 예보됩니다.</p>`,
      sources: [
        {t:"요금정산 중간보고", n:"작년 7/10 · 3년 연속 · D-4", s:"ok", c:94},
        {t:"하절기 설비 안전점검 결과 보고", n:"작년 7/16 · D-9", s:"ok", c:82},
        {t:"이사회 보고 안건 자료 제출", n:"작년 7/21 · D-14", s:"ok", c:79}
      ],
      actions: [
        {label:"D-4 업무 초안 준비", sub:"중간보고 초안 생성", href:"index.html#s3", icon:"D"},
        {label:"달력 대시보드 열기", sub:"S2 업무 예보", href:"index.html#s2", icon:"F"},
        {label:"근거 문서 보기", sub:"브리핑북 연결", href:"index.html#s1", icon:"B"}
      ]
    }
  };

  const EXAMPLES = ["prep","mid","risk","july"];
  const BADGE = {ok:"검증됨", warn:"주의", none:"근거 없음"};
  const exGrid = document.getElementById("exGrid");
  const q = document.getElementById("q");
  const q2 = document.getElementById("q2");
  const vEntry = document.getElementById("entry");
  const vResults = document.getElementById("results");
  const stream = document.getElementById("stream");
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  exGrid.innerHTML = EXAMPLES.map((key) => {
    const item = ANSWERS[key];
    return `<button class="tile" type="button" onclick="ask('${key}')"><b>${item.q}</b><span>${item.hint}</span></button>`;
  }).join("");

  function show(view){
    vEntry.classList.toggle("active", view === "entry");
    vResults.classList.toggle("active", view === "results");
  }

  function home(){
    show("entry");
    q.value = "";
    setTimeout(() => q.focus(), 40);
  }

  function findKey(text){
    if(ANSWERS[text]) return text;
    const t = (text || "").trim();
    if(!t) return "prep";
    if(/전환|정산시스템|IT|정보화|먼저|협의|확인/.test(t)) return "prep";
    if(/중간보고|작년|양식|기안/.test(t)) return "mid";
    if(/산출근거|누락|반려|감사|리스크|조심/.test(t)) return "risk";
    if(/7월|반복|예보|이번 달|D-/.test(t)) return "july";
    return "prep";
  }

  function ask(preset){
    let key;
    let typed;
    if(typeof preset === "string"){
      key = findKey(preset);
      typed = ANSWERS[key].q;
    }else{
      typed = (vResults.classList.contains("active") ? q2.value : q.value).trim();
      key = findKey(typed);
      if(!typed) typed = ANSWERS[key].q;
    }
    q.value = typed;
    q2.value = typed;
    show("results");
    window.scrollTo(0,0);
    render(key, typed);
    return false;
  }

  function render(key, typed){
    const answer = ANSWERS[key] || ANSWERS.prep;
    stream.innerHTML = `
      <section class="panel pad">
        <div class="thinking"><span class="spin"></span>사내 문서에서 근거를 찾는 중</div>
        <div class="skel"></div><div class="skel w70"></div><div class="skel w46"></div>
      </section>`;

    const reveal = () => {
      const sources = answer.sources.map((s, index) => `
        <li class="source">
          <span class="num">${index + 1}</span>
          <div><b>${s.t}</b><span>${s.n}</span></div>
          <div class="source-meta">
            ${s.c == null ? "" : `<span class="conf">${s.c}%</span>`}
            <span class="badge ${s.s}">${BADGE[s.s]}</span>
          </div>
        </li>`).join("");

      const actions = answer.actions.map((a) => `
        <a class="action-card" href="${a.href}">
          <span class="action-ico">${a.icon}</span>
          <span><b>${a.label}</b><span>${a.sub}</span></span>
        </a>`).join("");

      stream.innerHTML = `
        <div class="answer-grid">
          <section class="panel pad">
            <div class="section-label">ANSWER · ${answer.meta} · ${answer.verified ? "VERIFIED" : "CHECK REQUIRED"}</div>
            <h2 class="question">${typed}</h2>
            <div class="answer-body">${answer.body}</div>
            <ol class="source-list">${sources}</ol>
          </section>
          <aside class="side">
            ${actions}
            <div class="trust"><b>최종 판단은 담당자에게 있습니다.</b><br>JARVIS는 근거와 검증 상태를 보여줍니다. 문서 근거가 없으면 숨기지 않고 근거 없음으로 남깁니다.</div>
            <a class="action-card" href="admin.html">
              <span class="action-ico">A</span>
              <span><b>관리자 콘솔</b><span>인제스트·온톨로지·검증 흐름 보기</span></span>
            </a>
          </aside>
        </div>`;
    };

    reduce ? reveal() : setTimeout(reveal, 520);
  }

  addEventListener("keydown", (event) => {
    if(event.key === "Escape" && vResults.classList.contains("active")) home();
  });
  q.focus();
</script>
</body>
</html>
